# MPD (Music Player Daemon) configuration
# See 'man mpd.conf' for all available options.
# Started from the sway config: exec mpd

# Files and directories ######################################################

music_directory		"/home/USERNAME/music"
playlist_directory		"/home/USERNAME/.mpd/playlists"
db_file			"/home/USERNAME/.mpd/database"
pid_file			"/home/USERNAME/.mpd_pid"
state_file			"/home/USERNAME/.mpd_state"

# General options #############################################################

# Store absolute paths in saved playlists so other players can use them
save_absolute_paths_in_playlists	"yes"

# Input #######################################################################

# curl input plugin (HTTP streams / internet radio)
input {
        plugin "curl"
}

# Audio outputs ###############################################################

# Built-in HTTP streaming server on port 8000 (Ogg Vorbis)
audio_output {
	type		"httpd"
	name		"My HTTP Stream"
	encoder		"vorbis"		# optional, vorbis or lame
	port		"8000"
	bitrate		"128"			# do not define if quality is defined
	format		"44100:16:1"
}

# Normal local playback via PulseAudio/PipeWire
audio_output {
	type		"pulse"
	name		"My Pulse Output"
}

# FIFO output feeding the ncmpcpp spectrum visualizer
audio_output {
    type                    "fifo"
    name                    "my_fifo"
    path                    "/tmp/mpd.fifo"
    format                  "44100:16:2"
}
