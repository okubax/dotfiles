<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!-- User fontconfig: rendering defaults, generic-family substitutions,
     and a forced 192 DPI for the HiDPI laptop panel -->
<fontconfig>
    <!-- Rendering: antialiased, slight hinting, subpixel RGB -->
    <match target="font">
        <edit mode="assign" name="antialias"><bool>true</bool></edit>
        <edit mode="assign" name="autohint"><bool>false</bool></edit>
        <edit mode="assign" name="embeddedbitmap"><bool>false</bool></edit>
        <edit mode="assign" name="hinting"><bool>true</bool></edit>
        <edit mode="assign" name="hintstyle"><const>hintslight</const></edit>
        <edit mode="assign" name="lcdfilter"><const>lcddefault</const></edit>
        <edit mode="assign" name="rgba"><const>rgb</const></edit>
    </match>

    <!-- Noto Color Emoji is a bitmap-only font (CBDT/CBLC); the global
         embeddedbitmap=false above would blank it out in Firefox, so
         re-enable bitmaps for it specifically -->
    <match target="font">
        <test name="family"><string>Noto Color Emoji</string></test>
        <edit mode="assign" name="embeddedbitmap"><bool>true</bool></edit>
    </match>

    <!-- Route the generic emoji family to Noto Color Emoji -->
    <match target="pattern">
        <test qual="any" name="family"><string>emoji</string></test>
        <edit name="family" mode="assign" binding="same"><string>Noto Color Emoji</string></edit>
    </match>

    <!-- Add Noto Color Emoji as an emoji fallback for the generic families
         (must come before the Liberation mappings below, which rename them) -->
    <match target="pattern">
        <test qual="any" name="family"><string>sans-serif</string></test>
        <edit name="family" mode="append"><string>Noto Color Emoji</string></edit>
    </match>
    <match target="pattern">
        <test qual="any" name="family"><string>serif</string></test>
        <edit name="family" mode="append"><string>Noto Color Emoji</string></edit>
    </match>
    <match target="pattern">
        <test qual="any" name="family"><string>monospace</string></test>
        <edit name="family" mode="append"><string>Noto Color Emoji</string></edit>
    </match>

    <!-- Map the generic families to the Liberation fonts -->
    <match target="pattern">
        <test qual="any" name="family"><string>serif</string></test>
        <edit name="family" mode="assign" binding="same"><string>Liberation Serif</string></edit>
    </match>
    <match target="pattern">
        <test qual="any" name="family"><string>sans-serif</string></test>
        <edit name="family" mode="assign" binding="same"><string>Liberation Sans</string></edit>
    </match>
    <match target="pattern">
        <test qual="any" name="family"><string>monospace</string></test>
        <edit name="family" mode="assign" binding="same"><string>Liberation Mono</string></edit>
    </match>

    <!-- Force 192 DPI (2x scaling on the HiDPI panel) -->
    <match target="pattern">
        <edit name="dpi" mode="assign"><double>192</double></edit>
    </match>
</fontconfig>
