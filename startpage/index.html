<!doctype html>
<html lang="en">

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">

<title>~</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ctext x='1' y='13' font-size='15' fill='%23888'%3E~%3C/text%3E%3C/svg%3E">

<script>
  /* Apply the theme before first paint to avoid a white flash at night.
     Keep the hours in sync with config.darkHours below. */
  (function() {
    var theme = 'light';
    try {
      if (localStorage.getItem('autoTheme') !== 'false') {
        var hour = new Date().getHours();
        var dark = hour >= 19 || hour < 7;
        if (window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches) dark = true;
        theme = dark ? 'dark' : 'light';
      } else if (localStorage.getItem('theme') === 'dark') {
        theme = 'dark';
      }
    } catch (e) {}
    document.documentElement.setAttribute('data-theme', theme);
  })();
</script>

<style>
  :root {
    /* Light theme (default) */
    --bg-color: #ffffff;
    --text-color: #222222;
    --input-bg: #222222;
    --input-text: #ffffff;
    --sidebar-bg: #ffffff;
    --sidebar-shadow: rgba(0, 0, 0, 0.2);
    --hover-color: #333333;
  }

  [data-theme="dark"] {
    /* Dark theme */
    --bg-color: #1e1e2e;
    --text-color: #cdd6f4;
    --input-bg: #313244;
    --input-text: #cdd6f4;
    --sidebar-bg: #181825;
    --sidebar-shadow: rgba(0, 0, 0, 0.5);
    --hover-color: #f5c2e7;
  }

  body {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
    color: var(--text-color);
    background-color: var(--bg-color);
    font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
    font-weight: 300;
    transition: background-color 0.3s ease, color 0.3s ease;
  }

  main {
    position: absolute;
    top: 50%;
    right: 0;
    left: 0;
    width: 90%;
    max-width: 310px;
    margin: 0 auto;
    transform: translateY(-100px);
    text-align: center;
  }

  time {
    display: block;
    font-size: 5rem;
    letter-spacing: 6px;
  }

  .date {
    display: block;
    margin: 0 0 25px;
    font-size: 0.95rem;
    letter-spacing: 3px;
    opacity: 0.8;
  }

  input,
  input:focus {
    margin: 0;
    border: 0;
    outline: 0;
    -webkit-appearance: none;
    -moz-appearance: none;
  }

  input {
    box-sizing: border-box;
    width: 100%;
    padding: 12px;
    transition: 0.3s ease;
    border-radius: 2px;
    background-color: var(--input-bg);
    color: var(--input-text);
    font-family: inherit;
    font-size: 1.1rem;
  }

  input:focus {
    box-shadow: 0 0 10px rgba(116, 199, 236, 0.5);
  }

  aside {
    position: fixed;
    box-sizing: border-box;
    left: 0;
    width: 100%;
    max-width: 190px;
    height: 100%;
    padding: 15px 0 0;
    transition: transform 700ms, background-color 0.3s ease;
    transform: translateX(-205px);
    background-color: var(--sidebar-bg);
    box-shadow: 0 0 15px 0 var(--sidebar-shadow);
    overflow: auto;
    z-index: 1;
  }

  aside[data-toggled='true'] {
    transform: translateX(0);
  }

  h1 {
    margin: 0 25px 15px;
    line-height: 1rem;
    color: var(--text-color);
  }

  ul {
    margin: 0 0 15px;
    padding: 0;
  }

  li {
    list-style: none;
  }

  a {
    display: block;
    padding: 0 25px;
    color: var(--text-color);
    line-height: 1.7rem;
    text-decoration: none;
    transition: color 0.2s ease;
  }

  a:hover .help-name {
    color: var(--hover-color);
    text-decoration: underline;
  }

  .help-key {
    font-family: 'Courier New', monospace;
  }

  .help-name {
    font-size: 0.9rem;
    transition: color 0.2s ease;
  }

  .theme-toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    background: var(--input-bg);
    color: var(--input-text);
    border: none;
    border-radius: 50%;
    width: 50px;
    height: 50px;
    cursor: pointer;
    /* Buttons don't inherit the body font; route the icon glyphs straight
       to a color emoji font so Firefox doesn't pick a symbol font for the
       sun and render its U+FE0F variation selector as tofu */
    font-family: 'Noto Color Emoji', 'Segoe UI Emoji', sans-serif;
    font-size: 1.2rem;
    transition: all 0.3s ease;
    z-index: 10;
  }

  .theme-toggle:hover {
    transform: scale(1.1);
    box-shadow: 0 4px 15px var(--sidebar-shadow);
  }

  .auto-indicator {
    position: fixed;
    top: 80px;
    right: 20px;
    background: var(--input-bg);
    color: var(--input-text);
    padding: 5px 10px;
    border-radius: 15px;
    font-size: 0.8rem;
    opacity: 0;
    transition: opacity 0.3s ease;
    z-index: 10;
  }

  .auto-indicator.show {
    opacity: 0.8;
  }
</style>

<main>
  <time id="js-clock"></time>
  <div class="date" id="js-date"></div>
  <form id="js-search-form" autocomplete="off">
    <input id="js-search-input" type="text" autofocus spellcheck="false" autocapitalize="off" autocorrect="off">
  </form>
</main>

<aside id="js-sidebar">
  <h1>~</h1>
  <ul id="js-help"></ul>
</aside>

<button class="theme-toggle" id="theme-toggle" title="Toggle theme">🌗</button>
<div class="auto-indicator" id="auto-indicator">AUTO</div>

<script>
  var config = {
    // `url` is where a bare key navigates; `search` is appended (with the
    // query) to `searchUrl` if present, otherwise to `url`.
    commands: [
      { key: 'a', name: 'ArchLinux', url: 'https://archlinux.org', search: '/packages/?q=' },
      { key: 'b', name: 'BBC', url: 'https://www.bbc.co.uk', search: '/search?q=' },
      { key: 'd', name: 'Drive', url: 'https://your-nextcloud-server.com/index.php/apps/files/' },
      { key: 'c', name: 'Calendar', url: 'https://your-nextcloud-server.com/index.php/apps/calendar/' },
      { key: 'C', name: 'Contacts', url: 'https://your-nextcloud-server.com/index.php/apps/contacts/' },
      { key: 'e', name: 'Egghead', url: 'https://egghead.io', search: '/search?q=' },
      { key: 'f', name: 'Facebook', url: 'https://www.facebook.com', search: '/search/top/?q=' },
      { key: 'g', name: 'GitHub', url: 'https://github.com', search: '/search?q=' },
      { key: 'G', name: 'Guardian', url: 'https://www.theguardian.com/uk', searchUrl: 'https://www.theguardian.com', search: '/search?q=' },
      { key: 'h', name: 'Hacker News', url: 'https://news.ycombinator.com', searchUrl: 'https://hn.algolia.com', search: '/?q=' },
      { key: 'm', name: 'Gmail', url: 'https://mail.google.com/mail/u/0/#inbox', searchUrl: 'https://mail.google.com/mail/u/0/', search: '#search/' },
      { key: 'n', name: 'Notes', url: 'https://your-nextcloud-server.com/index.php/apps/notes/' },
      { key: 'o', name: 'Outlook', url: 'https://outlook.live.com/mail/0/' },
      { key: 'p', name: 'Paper', url: 'https://your-notes-app.example.com', search: '/search?q=' },
      { key: 'r', name: 'Reddit', url: 'https://www.reddit.com', search: '/search?q=' },
      { key: 's', name: 'Stack Exchange', url: 'https://stackexchange.com', search: '/search?q=' },
      { key: 'S', name: 'SoundCloud', url: 'https://soundcloud.com', search: '/search?q=' },
      { key: 't', name: 'X (Twitter)', url: 'https://x.com', search: '/search?q=' },
      { key: 'u', name: 'Unsplash', url: 'https://unsplash.com', search: '/s/photos/' },
      { key: 'U', name: 'UoPeople', url: 'https://my.uopeople.edu/' },
      { key: 'y', name: 'YouTube', url: 'https://www.youtube.com', search: '/results?search_query=' },
    ],

    defaultCommand: 'https://www.google.com/search?q=',
    searchDelimiter: ':',

    // Theme settings (keep darkHours in sync with the inline script in <head>)
    darkHours: { start: 19, end: 7 }, // Dark theme from 7 PM to 7 AM
    autoTheme: true // Enable automatic theme switching
  };

  /**
   * Theme Management
   * Cycle: auto → light → dark → auto. Auto is dark when the OS prefers
   * dark OR the current hour falls inside darkHours.
   */
  var Theme = (function(config) {
    var themeToggle = document.getElementById('theme-toggle');
    var autoIndicator = document.getElementById('auto-indicator');
    var darkQuery = window.matchMedia ? window.matchMedia('(prefers-color-scheme: dark)') : null;
    var currentTheme = 'light';
    var isAuto = config.autoTheme;

    function storageGet(key) {
      try { return localStorage.getItem(key); } catch (e) { return null; }
    }

    function storageSet(key, value) {
      try { localStorage.setItem(key, value); } catch (e) {}
    }

    function updateButton() {
      if (isAuto) {
        themeToggle.textContent = '🌗';
        themeToggle.title = 'Theme: auto (' + currentTheme + ') — click for light';
      } else if (currentTheme === 'light') {
        themeToggle.textContent = '☀️';
        themeToggle.title = 'Theme: light — click for dark';
      } else {
        themeToggle.textContent = '🌙';
        themeToggle.title = 'Theme: dark — click for auto';
      }
    }

    function applyTheme(theme) {
      currentTheme = theme;
      document.documentElement.setAttribute('data-theme', theme);
      updateButton();
    }

    function updateAutoTheme() {
      if (!isAuto) return;
      var hour = new Date().getHours();
      var dark = hour >= config.darkHours.start || hour < config.darkHours.end;
      if (darkQuery && darkQuery.matches) dark = true;
      applyTheme(dark ? 'dark' : 'light');
    }

    function setAutoMode(auto) {
      isAuto = auto;
      storageSet('autoTheme', auto.toString());
      autoIndicator.classList.toggle('show', auto);
      if (auto) updateAutoTheme();
    }

    // Initialize from saved state (the inline head script already painted it)
    var savedAuto = storageGet('autoTheme');
    if (savedAuto !== null) isAuto = savedAuto === 'true';

    if (isAuto) {
      setAutoMode(true);
    } else {
      applyTheme(storageGet('theme') === 'dark' ? 'dark' : 'light');
    }

    themeToggle.addEventListener('click', function() {
      if (isAuto) {
        setAutoMode(false);
        applyTheme('light');
        storageSet('theme', 'light');
      } else if (currentTheme === 'light') {
        applyTheme('dark');
        storageSet('theme', 'dark');
      } else {
        setAutoMode(true);
      }
    });

    // Track OS theme changes and re-check the clock every minute
    if (darkQuery) {
      var onSchemeChange = function() { updateAutoTheme(); };
      if (darkQuery.addEventListener) darkQuery.addEventListener('change', onSchemeChange);
      else if (darkQuery.addListener) darkQuery.addListener(onSchemeChange);
    }
    setInterval(updateAutoTheme, 60000);

    return {
      getCurrentTheme: function() { return currentTheme; }
    };
  })(config);

  /**
   * Clock
   */
  (function() {
    var clock = document.getElementById('js-clock');
    var dateLine = document.getElementById('js-date');

    function leftpad(num) {
      return ('0' + num.toString()).slice(-2);
    }

    function setTime() {
      var date = new Date();
      clock.textContent = leftpad(date.getHours()) + ' ' + leftpad(date.getMinutes());
      dateLine.textContent = date.toLocaleDateString('en-GB', {
        weekday: 'long', day: 'numeric', month: 'long'
      });
    }

    setTime();
    setInterval(setTime, 1000);
  })();

  /**
   * Help
   */
  var Help = (function(config) {
    var head = document.getElementsByTagName('head')[0];
    var sidebar = document.getElementById('js-sidebar');
    var searchHelp = document.getElementById('js-help');
    var seenOrigins = {};

    config.commands.forEach(function(command) {
      var origin = new URL(command.url).origin;
      if (!seenOrigins[origin]) {
        seenOrigins[origin] = true;
        var prefetch = document.createElement('link');
        prefetch.rel = 'dns-prefetch';
        prefetch.href = origin;
        head.appendChild(prefetch);
      }

      var li = document.createElement('li');
      var anchor = document.createElement('a');
      var key = document.createElement('span');
      var name = document.createElement('span');

      key.className = 'help-key';
      key.textContent = command.key + config.searchDelimiter + ' ';
      name.className = 'help-name';
      name.textContent = command.name;
      anchor.href = command.url;

      anchor.appendChild(key);
      anchor.appendChild(name);
      li.appendChild(anchor);
      searchHelp.appendChild(li);
    });

    document.addEventListener('keydown', function(event) {
      if (event.key === 'Escape') sidebar.removeAttribute('data-toggled');
    });

    return {
      toggle: function() {
        var toggle = sidebar.getAttribute('data-toggled') !== 'true';
        sidebar.setAttribute('data-toggled', toggle);
      }
    };
  })(config);

  /**
   * Form
   */
  var Form = (function(config) {
    var searchForm = document.getElementById('js-search-form');
    var searchInput = document.getElementById('js-search-input');
    var urlRegex = /^(https?|file):\/\/\S+$/i;
    var domainRegex = /^[a-z0-9-]+(\.[a-z0-9-]+)+(:\d+)?(\/\S*)?$/i;

    function buildRedirect(raw) {
      // A leading space or quote forces a plain search: no command matching,
      // no URL detection, and a trailing ! is kept literal.
      var forcePlain = /^[\s'"]/.test(raw);
      var q = raw.replace(/^[\s'"]+/, '').trim();
      var newTab = false;

      if (!forcePlain && q.length > 1 && q.slice(-1) === '!') {
        newTab = true;
        q = q.slice(0, -1).trim();
      }

      if (q === '' || q === '?') return { help: true };

      var redirect;
      if (!forcePlain && urlRegex.test(q)) {
        redirect = q;
      } else if (!forcePlain && domainRegex.test(q)) {
        redirect = 'https://' + q;
      } else {
        redirect = config.defaultCommand + encodeURIComponent(q);
      }

      if (!forcePlain) {
        var qSplit = q.split(config.searchDelimiter);
        config.commands.forEach(function(command) {
          if (qSplit[0] === command.key) {
            if (qSplit[1] && command.search) {
              qSplit.shift();
              var search = encodeURIComponent(qSplit.join(config.searchDelimiter).trim());
              redirect = (command.searchUrl || command.url) + command.search + search;
            } else {
              redirect = command.url;
            }
          }
        });
      }

      return { redirect: redirect, newTab: newTab };
    }

    function submitQuery(forceNewTab) {
      var result = buildRedirect(searchInput.value);

      if (result.help) {
        Help.toggle();
        searchInput.value = '';
        return;
      }

      if (forceNewTab || result.newTab) {
        window.open(result.redirect, '_blank');
        searchInput.value = '';
      } else {
        window.location.href = result.redirect;
      }
    }

    searchForm.addEventListener('submit', function(event) {
      event.preventDefault();
      submitQuery(false);
    });

    // Ctrl+Enter (or Cmd+Enter) opens the result in a new tab
    searchInput.addEventListener('keydown', function(event) {
      if (event.key === 'Enter' && (event.ctrlKey || event.metaKey)) {
        event.preventDefault();
        submitQuery(true);
      }
    });

    // Keep the search box focused: typing anywhere lands in it, and
    // switching back to the tab restores focus
    document.addEventListener('keydown', function(event) {
      if (document.activeElement === searchInput) return;
      if (event.ctrlKey || event.altKey || event.metaKey) return;
      if (event.key.length === 1) searchInput.focus();
    });
    window.addEventListener('focus', function() {
      searchInput.focus();
    });

    return {
      searchInput: searchInput
    };
  })(config);
</script>
